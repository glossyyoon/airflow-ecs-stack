acme:
  target: dev
  outputs:
    dev:
      type: redshift
      host: "{{ env_var('DBT_REDSHIFT_HOST', 'redshift.example.local') }}"
      port: "{{ env_var('DBT_REDSHIFT_PORT', '5439') | int }}"
      user: "{{ env_var('DBT_REDSHIFT_USER', 'dbt') }}"
      password: "{{ env_var('DBT_REDSHIFT_PASSWORD', '') }}"
      dbname: "{{ env_var('DBT_REDSHIFT_DB', 'analytics') }}"
      schema: "{{ env_var('DBT_REDSHIFT_SCHEMA', 'dbt_dev') }}"
      threads: 4
      keepalives_idle: 240
      sslmode: require
